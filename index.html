<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Lições de Japonês</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
  <style>
    .markdown-section {
      max-width: min(1100px, calc(100vw - 4rem));
      font-size: 1.05rem;
      line-height: 1.7;
    }

    .markdown-section h4:has(.kanji-title) {
      text-align: center;
    }

    .markdown-section h4 .kanji-title {
      font-size: 5rem;
      line-height: 1;
      font-weight: 500;
    }

    .markdown-section h4:has(.kanji-title) + p {
      text-align: center;
      margin-top: 0.2rem;
    }

    .markdown-section blockquote {
      background: #eef1f4;
      border-left: 0;
      border-radius: 12px;
      padding: 0.85rem 1rem;
      max-width: 40rem;
      margin: 0.85rem auto 1rem;
      text-align: center;
    }

    .markdown-section blockquote p:last-child {
      margin-bottom: 0;
    }

    .markdown-section table {
      display: table;
      width: 100% !important;
      min-width: 100%;
      max-width: 100%;
      margin: 1rem auto 1.25rem;
      border-collapse: collapse;
      background: #fff;
      border: none !important;
      font-size: 1.05rem;
      table-layout: auto;
    }

    .markdown-section thead th {
      color: #243041;
      font-weight: 600;
      padding: 0.75rem 0.85rem;
      border: none !important;
      text-align: center;
    }

    .markdown-section tbody td {
      padding: 0.8rem 0.85rem;
      border: none !important;
      vertical-align: middle;
      text-align: center;
    }

    .markdown-section table th,
    .markdown-section table td {
      border-top: 0 !important;
      border-bottom: 0 !important;
      border-left: 0 !important;
      border-right: 0 !important;
    }

    .markdown-section table thead tr {
      border-bottom: 1px solid #d5dbe3 !important;
    }

    .markdown-section table tbody tr {
      border-top: 0 !important;
      border-bottom: 0 !important;
    }

    .markdown-section ruby {
      ruby-position: over;
      ruby-align: center;
      font-size: 1.15em;
      line-height: 1.35;
    }

    .markdown-section rt {
      font-size: 0.5em;
      letter-spacing: 0.02em;
      color: #4b5563;
      font-weight: 500;
      line-height: 1;
    }

    .markdown-section .anki-embed-group {
      width: fit-content;
      max-width: 100%;
      margin: 1rem auto 1.25rem;
    }

    .markdown-section .anki-embed {
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 1rem;
      margin: 0;
      background: #fff;
      width: 100%;
      max-width: 100%;
    }

    .markdown-section .anki-card {
      min-height: 96px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      aspect-ratio: var(--anki-card-ratio, 2);
      width: auto;
      max-width: 100%;
      margin: 0 auto;
    }

    .markdown-section .anki-embed .card {
      font-family: sans-serif;
      font-size: 28px;
      text-align: center;
      padding: 0.45em;
      line-height: 1.3;
    }

    .markdown-section .anki-embed ruby rt {
      font-size: 0.5em;
    }

    .markdown-section .anki-embed #answer {
      margin: 0.3em auto 0.4em;
    }

    .markdown-section .anki-embed .muted {
      margin-top: 0.35em;
      font-size: 0.7em;
      opacity: 0.65;
    }

    .markdown-section .anki-embed .meaning {
      font-size: 0.9em;
    }

    .markdown-section .anki-controls {
      margin-top: 0.85rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
      width: 100%;
    }

    .markdown-section .anki-export-controls {
      margin: 0.55rem 0 0;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
      width: 100%;
    }

    .markdown-section .anki-controls button,
    .markdown-section .anki-export-controls .deck-download {
      border: 1px solid #cbd5e1;
      background: #f8fafc;
      color: #1e293b;
      border-radius: 8px;
      padding: 0.35rem 0.65rem;
      font-size: 0.9rem;
      text-decoration: none;
      cursor: pointer;
    }

    .markdown-section .anki-export-controls .deck-primary {
      background: #e8f1ff;
      border-color: #a9c4f5;
      color: #163b75;
      font-weight: 600;
    }

    .markdown-section .anki-export-controls .deck-secondary {
      background: #f8fafc;
      border-color: #cbd5e1;
      color: #1e293b;
    }

    .markdown-section .anki-export-controls .deck-download {
      flex: 1 1 0;
      text-align: center;
      min-width: 0;
    }

    .markdown-section .anki-controls button.icon-only {
      min-width: 0;
      width: auto;
      flex: 1 1 0;
      padding: 0.35rem 0.45rem;
      text-align: center;
    }

    .markdown-section .anki-controls button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .markdown-section .anki-controls .flip-toggle .fa-solid {
      display: none;
    }

    .markdown-section .anki-embed[data-face="back"] .anki-controls .flip-toggle .fa-regular {
      display: none;
    }

    .markdown-section .anki-embed[data-face="back"] .anki-controls .flip-toggle .fa-solid {
      display: inline-block;
    }

    @media (max-width: 900px) {
      .markdown-section {
        max-width: calc(100vw - 2rem);
        font-size: 1rem;
      }

      .markdown-section table {
        display: table;
        width: 100%;
        min-width: 100%;
        max-width: 100%;
        font-size: 1rem;
      }
    }

    .sidebar-nav .section-link,
    .sidebar .app-sub-sidebar a {
      font-size: 12px !important;
      line-height: 1.3;
      font-weight: normal !important;
    }
  </style>
</head>
<body>
  <div id="app">Carregando lição...</div>
  <script>
    window.$docsify = {
      name: 'Japonês Vocab',
      repo: '',
      executeScript: true,
      plugins: [
        function (hook) {
          hook.doneEach(function () {
            if (window.initAnkiEmbeds) {
              window.initAnkiEmbeds();
            }
          });
        }
      ]
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script>
    window.initAnkiEmbeds = function () {
      document.querySelectorAll('.anki-embed[data-cards-b64]').forEach(function (root) {
        if (root.dataset.initialized === '1') {
          return;
        }
        root.dataset.initialized = '1';

        var cardEl = root.querySelector('.anki-card');
        var raw = root.getAttribute('data-cards-b64') || '';
        var cards = [];
        try {
          var bin = atob(raw);
          var bytes = Uint8Array.from(bin, function (char) {
            return char.charCodeAt(0);
          });
          var decoded = new TextDecoder('utf-8').decode(bytes);
          cards = JSON.parse(decoded);
        } catch (error) {
          cardEl.innerHTML = '<em>Erro ao carregar cards</em>';
          return;
        }

        var index = 0;
        var isFront = true;
        var firstPassNoShuffle = root.getAttribute('data-first-pass-no-shuffle') === '1';
        var seenFront = {};
        var canShuffle = !firstPassNoShuffle;
        var prevBtn = root.querySelector('[data-action="prev"]');
        var nextBtn = root.querySelector('[data-action="next"]');
        var shuffleBtn = root.querySelector('[data-action="shuffle"]');

        function frontHtml(card) {
          return '<div class="card"><div class="furigana-output">' + card.furigana + '</div></div>';
        }

        function backHtml(card) {
          return '<div class="card"><div class="furigana-output">' + card.furigana + '</div><hr id="answer"><div class="muted">' + card.romaji + '</div><div class="meaning">' + card.meaning + '</div></div>';
        }

        function lockCardHeight() {
          if (!cards.length) {
            return;
          }

          var probe = document.createElement('div');
          probe.style.position = 'absolute';
          probe.style.visibility = 'hidden';
          probe.style.pointerEvents = 'none';
          probe.style.left = '-9999px';
          probe.style.top = '0';

          var width = cardEl.getBoundingClientRect().width || root.getBoundingClientRect().width;
          if (width) {
            probe.style.width = width + 'px';
          }

          root.appendChild(probe);
          var maxHeight = 0;

          cards.forEach(function (card) {
            probe.innerHTML = frontHtml(card);
            maxHeight = Math.max(maxHeight, probe.offsetHeight);

            probe.innerHTML = backHtml(card);
            maxHeight = Math.max(maxHeight, probe.offsetHeight);
          });

          root.removeChild(probe);
          if (maxHeight > 0) {
            var locked = Math.ceil(maxHeight);
            cardEl.style.minHeight = locked + 'px';
            cardEl.style.height = locked + 'px';
          }
        }

        function updateNavState() {
          if (!prevBtn || !nextBtn) {
            return;
          }
          if (canShuffle) {
            prevBtn.disabled = false;
            nextBtn.disabled = false;
            return;
          }
          prevBtn.disabled = index === 0;
          nextBtn.disabled = index === cards.length - 1;
        }

        function render() {
          var card = cards[index];
          if (!card) {
            cardEl.innerHTML = '<em>Sem cards</em>';
            return;
          }
          if (firstPassNoShuffle && isFront) {
            seenFront[index] = true;
            if (Object.keys(seenFront).length >= cards.length) {
              canShuffle = true;
              firstPassNoShuffle = false;
              if (shuffleBtn) {
                shuffleBtn.disabled = false;
              }
            }
          }
          updateNavState();
          root.setAttribute('data-face', isFront ? 'front' : 'back');
          cardEl.innerHTML = isFront ? frontHtml(card) : backHtml(card);
        }

        function next() {
          if (index < cards.length - 1) {
            index += 1;
          } else if (canShuffle) {
            index = 0;
          }
          isFront = true;
          render();
        }

        function prev() {
          if (index > 0) {
            index -= 1;
          } else if (canShuffle) {
            index = cards.length - 1;
          }
          isFront = true;
          render();
        }

        function flip() {
          isFront = !isFront;
          render();
        }

        function shuffle() {
          if (!canShuffle) {
            return;
          }
          for (var i = cards.length - 1; i > 0; i -= 1) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = cards[i];
            cards[i] = cards[j];
            cards[j] = tmp;
          }
          index = 0;
          isFront = true;
          render();
        }

        root.querySelector('[data-action="next"]').addEventListener('click', next);
        root.querySelector('[data-action="prev"]').addEventListener('click', prev);
        root.querySelector('[data-action="flip"]').addEventListener('click', flip);
        if (shuffleBtn) {
          shuffleBtn.disabled = !canShuffle;
          shuffleBtn.addEventListener('click', shuffle);
        }

        lockCardHeight();
        window.addEventListener('resize', function () {
          lockCardHeight();
          render();
        });
        render();
      });
    };
  </script>
</body>

</html>

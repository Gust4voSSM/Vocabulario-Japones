<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Lições de Japonês</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    .markdown-section {
      max-width: min(1100px, calc(100vw - 4rem));
      font-size: 1.05rem;
      line-height: 1.7;
    }

    .markdown-section h4:has(.kanji-title) {
      text-align: center;
    }

    .markdown-section h4 .kanji-title {
      font-size: 5rem;
      line-height: 1;
      font-weight: 500;
    }

    .markdown-section h4:has(.kanji-title) + p {
      text-align: center;
      margin-top: 0.2rem;
    }

    .markdown-section blockquote {
      background: #eef1f4;
      border-left: 0;
      border-radius: 12px;
      padding: 0.85rem 1rem;
      max-width: 40rem;
      margin: 0.85rem auto 1rem;
      text-align: center;
    }

    .markdown-section blockquote p:last-child {
      margin-bottom: 0;
    }

    .markdown-section table {
      display: table;
      width: 100% !important;
      min-width: 100%;
      max-width: 100%;
      margin: 1rem auto 1.25rem;
      border-collapse: collapse;
      background: #fff;
      border: none !important;
      font-size: 1.05rem;
      table-layout: auto;
    }

    .markdown-section thead th {
      color: #243041;
      font-weight: 600;
      padding: 0.75rem 0.85rem;
      border: none !important;
      text-align: center;
    }

    .markdown-section tbody td {
      padding: 0.8rem 0.85rem;
      border: none !important;
      vertical-align: middle;
      text-align: center;
    }

    .markdown-section table th,
    .markdown-section table td {
      border-top: 0 !important;
      border-bottom: 0 !important;
      border-left: 0 !important;
      border-right: 0 !important;
    }

    .markdown-section table thead tr {
      border-bottom: 1px solid #d5dbe3 !important;
    }

    .markdown-section table tbody tr {
      border-top: 0 !important;
      border-bottom: 0 !important;
    }

    .markdown-section ruby {
      ruby-position: over;
      ruby-align: center;
      font-size: 1.15em;
      line-height: 1.35;
    }

    .markdown-section rt {
      font-size: 0.5em;
      letter-spacing: 0.02em;
      color: #4b5563;
      font-weight: 500;
      line-height: 1;
    }

    @media (max-width: 900px) {
      .markdown-section {
        max-width: calc(100vw - 2rem);
        font-size: 1rem;
      }

      .markdown-section table {
        display: table;
        width: 100%;
        min-width: 100%;
        max-width: 100%;
        font-size: 1rem;
      }
    }

    .sidebar-nav .section-link,
    .sidebar .app-sub-sidebar a {
      font-size: 12px !important;
      line-height: 1.3;
      font-weight: normal !important;
    }
  </style>
</head>
<body>
  <div id="app">Carregando lição...</div>
  <script>
    window.$docsify = {
      name: 'Japonês Vocab',
      repo: '',
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
</body>

</html>
